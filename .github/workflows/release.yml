# Publish on tag: the npm packages, and a GitHub Release with the devices.
#
# Triggered by pushing a tag like `v0.6.0`. What you used to do by hand
# (`npm login` && `pnpm release`) happens here instead, from a clean checkout that
# has just proved it builds and passes its tests.
#
# THE TAG IS THE SOURCE OF TRUTH, AND IT IS CHECKED. A tag that does not match the
# version in package.json is the one mistake this cannot recover from: npm refuses
# to republish a version, so a wrong number is permanent. The job fails BEFORE it
# publishes anything rather than after publishing half the packages.
#
# Set-up, once (see doc/RELEASING.md): TRUSTED PUBLISHING, no token at all.
#   npmjs.org  -> each @m4l-jweb/* package -> Settings -> Trusted Publisher ->
#                 GitHub Actions: owner `alienmind`, repo `m4l-jweb`, workflow
#                 `release.yml`. npm then trusts THIS workflow to publish, over OIDC.
#   Nothing in GitHub secrets: the `id-token: write` permission below is the whole
#   credential. This is what npm's 2FA requirement pushes you to, and it is strictly
#   better than a token - nothing to leak, nothing to expire, and npm records exactly
#   which workflow run published each version.
#
#   OIDC trusted publishing lives in the NPM CLI (>= 11.5.1), not pnpm - so pnpm PACKS
#   each package (rewriting `workspace:*` to the real version) and npm PUBLISHES the
#   tarball. See the publish step.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # to create the GitHub Release
  id-token: write # provenance: npm records WHICH workflow published each version

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` - it is pinned in package.json's `packageManager` field, and
      # action-setup@v4 ERRORS if it is told twice. Let the manifest be the source.
      - uses: pnpm/action-setup@v4

      # NO `registry-url`. It makes setup-node write an .npmrc with
      # `_authToken=${NODE_AUTH_TOKEN}` and export a placeholder token - and pnpm then
      # authenticates with that empty token INSTEAD of OIDC, so trusted publishing never
      # runs and the publish 404s. pnpm defaults to registry.npmjs.org anyway.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The tag against the manifest, and every package against the root. A version
      # bump that missed one package would publish a 0.6.0 that depends on a 0.5.0
      # that no longer exists - and it cannot be taken back.
      - name: the tag must be the version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          ROOT=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$ROOT" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $ROOT"
            exit 1
          fi
          for pkg in packages/*/package.json; do
            V=$(node -p "require('./$pkg').version")
            if [ "$V" != "$ROOT" ]; then
              echo "::error::$pkg is $V, but the release is $ROOT - every package ships together"
              exit 1
            fi
          done
          echo "releasing $ROOT"

      - run: pnpm build
      - run: pnpm test

      # OIDC trusted publishing is an NPM-CLI feature (>= 11.5.1), not pnpm's - pnpm
      # publish never does the token exchange, so it fails with ENEEDAUTH. Node 22 ships
      # an older npm, so upgrade it here.
      - name: npm that can do trusted publishing
        run: npm install --global npm@latest

      # So: pnpm PACKS (which rewrites `workspace:*` to the real version - the reason
      # the version check above matters), and npm PUBLISHES the tarball over OIDC. With
      # a Trusted Publisher configured on npm (see header) and `id-token: write` above,
      # npm authenticates over OIDC and generates provenance. No token, nothing in `env`.
      - name: publish to npm (pnpm packs, npm publishes over OIDC)
        run: |
          for dir in packages/*/; do
            ( cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP" )
          done
          for tgz in "$RUNNER_TEMP"/*.tgz; do
            echo "::group::publish $(basename "$tgz")"
            npm publish "$tgz" --access public --provenance
            echo "::endgroup::"
          done

      # The devices, for people who want to drop an .amxd into Live and never touch npm.
      - name: github release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.amxd
            dist/m4l-jweb.zip
