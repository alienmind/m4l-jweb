# CI - what must be true of every push.
#
# The build is the first assertion, and it is a real one: `pnpm build` emits every
# .amxd WITH NO MAX INSTALLED. If a patcher is malformed, a box id is duplicated or
# the wrapper is not ES5, the build fails here rather than in someone's Live set.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # No `version:` - it is pinned in package.json's `packageManager` field, and
      # action-setup@v4 ERRORS if it is told twice ("Multiple versions of pnpm
      # specified"). Let the manifest be the one source of truth.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # tsc, the UI bundles, the wrapper (parsed with acorn at ecmaVersion 5), the
      # patchers and the .amxd containers.
      - run: pnpm build

      # Container round-trip, ES5 gate, protocol lint, bundle separation.
      - run: pnpm test

      # The devices themselves, for anyone who wants to try a PR without building it.
      # packageDevices() writes them to dist/<package-name>/, i.e. dist/m4l-jweb/ -
      # NOT the dist root (upload-artifact@v4 errors on no match, so the glob must be
      # the real path).
      - uses: actions/upload-artifact@v5
        with:
          name: devices
          path: dist/m4l-jweb/*.amxd
          if-no-files-found: error
